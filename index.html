<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamsal Kirana Stores | Premium Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .input-dark:focus { border-color: #10b981; outline: none; ring: 2px #10b981; }
        .btn-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #10b981; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-white">

    <div class="glass-card w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-500/20 rounded-full mb-4">
                <i class="fas fa-shopping-basket text-emerald-500 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Lamsal Kirana</h1>
            <p class="text-gray-400 text-sm mt-2">Sign in to your account</p>
        </div>

        <!-- Notification -->
        <div id="statusBox" class="hidden mb-6 p-4 rounded-2xl text-sm text-center"></div>

        <!-- Form -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 ml-1">Username / Mobile / Email</label>
                <input type="text" id="identifier" required 
                    class="input-dark w-full px-5 py-4 rounded-2xl transition-all" 
                    placeholder="Enter details...">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" id="password" required 
                    class="input-dark w-full px-5 py-4 rounded-2xl transition-all" 
                    placeholder="••••••••">
            </div>

            <div class="flex justify-end">
                <button type="button" onclick="handleForgot()" class="text-xs font-medium text-emerald-400 hover:text-emerald-300">
                    Forgot password?
                </button>
            </div>

            <button type="submit" id="loginBtn" class="btn-gradient w-full py-4 rounded-2xl font-bold text-lg">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#161e2f] px-4 text-gray-500 font-bold">Or continue with</span></div>
        </div>

        <!-- Google Login -->
        <button id="googleBtn" class="w-full bg-white text-gray-900 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-100 transition-all active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" alt="Google">
            Login with Google
        </button>

        <p class="text-center text-gray-500 text-xs mt-10">
            &copy; 2024 Lamsal Kirana Stores. All rights reserved.
        </p>
    </div>

    <!-- Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail,
            GoogleAuthProvider,
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyBGOtzwfGhDOIEpcUtc-m7TIU9KLP6L100",
            authDomain: "lamsalauth.firebaseapp.com",
            projectId: "lamsalauth",
            storageBucket: "lamsalauth.firebasestorage.app",
            messagingSenderId: "1087666109571",
            appId: "1:1087666109571:web:5ea70c7add916cb6e5afb6",
            measurementId: "G-6G5QV8JX6K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusBox = document.getElementById('statusBox');
        const getRedirect = () => new URLSearchParams(window.location.search).get('redirect') || '#';

        const showMsg = (msg, err = true) => {
            statusBox.innerText = msg;
            statusBox.className = `p-4 rounded-2xl text-sm text-center mb-6 ${err ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50'}`;
            statusBox.classList.remove('hidden');
        };

        // Email/Password Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('identifier').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            // Simple logic for Username/Mobile
            let email = id.includes('@') ? id : `${id}@lamsal.com`;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showMsg("Login Success! Redirecting...", false);
                setTimeout(() => window.location.href = getRedirect(), 1500);
            } catch (error) {
                showMsg("Login Failed: " + error.message);
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        };

        // Google Login logic
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                showMsg("Google Login Success!", false);
                setTimeout(() => window.location.href = getRedirect(), 1000);
            } catch (error) {
                showMsg("Google Error: " + error.message);
            }
        };

        // Forgot Password logic
        window.handleForgot = async () => {
            const id = document.getElementById('identifier').value;
            if(!id) return showMsg("Enter your email/username first");
            let email = id.includes('@') ? id : `${id}@lamsal.com`;
            try {
                await sendPasswordResetEmail(auth, email);
                showMsg("Reset link sent to email!", false);
            } catch (e) { showMsg(e.message); }
        };
    </script>
</body>
</html>
