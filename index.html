<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamsal Auth | Premium Unified Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #064e3b 0%, #020617 50%),
                        radial-gradient(circle at 100% 100%, #111827 0%, #020617 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .btn-premium {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
            filter: brightness(1.1);
        }

        .google-btn {
            background: white;
            color: #1f2937;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: #f3f4f6;
            transform: translateY(-1px);
        }

        .hidden { display: none; }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- AUTH CONTAINER -->
    <div id="authBox" class="w-full max-w-md animate-fade">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-4">
                <i class="fas fa-shield-halved text-emerald-500 text-3xl"></i>
            </div>
            <h1 id="authTitle" class="text-3xl font-extrabold tracking-tight">Lamsal <span class="text-emerald-500">Auth</span></h1>
            <p class="text-gray-400 text-sm mt-2">Professional Unified Identity Gateway</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-10">
            <form id="loginForm" class="space-y-4">
                <div id="regFields" class="hidden space-y-4">
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="regName" class="input-field w-full pl-12 pr-4 py-4 rounded-2xl" placeholder="Full Name">
                    </div>
                </div>
                
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="email" class="input-field w-full pl-12 pr-4 py-4 rounded-2xl" placeholder="Email Address" required>
                </div>

                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="password" class="input-field w-full pl-12 pr-4 py-4 rounded-2xl" placeholder="Password" required>
                </div>

                <button type="submit" id="mainBtn" class="btn-premium w-full py-4 rounded-2xl font-bold text-white mt-2">
                    Continue Access
                </button>
            </form>

            <div class="relative my-8 text-center">
                <hr class="border-gray-800">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#0d1424] px-4 text-xs text-gray-500 font-bold uppercase tracking-widest">OR</span>
            </div>

            <button onclick="loginWithGoogle()" class="google-btn w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="Google">
                Sign in with Google
            </button>

            <button id="toggleAuth" class="mt-8 text-emerald-400 text-sm font-semibold w-full text-center hover:text-emerald-300 transition-colors">
                New to Lamsal? Create an account
            </button>
        </div>
    </div>

    <!-- ADMIN CONSOLE -->
    <div id="adminConsole" class="hidden w-full max-w-6xl animate-fade">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h2 class="text-4xl font-black italic tracking-tighter">CONSOLE<span class="text-emerald-500">.</span></h2>
                <p class="text-gray-400 text-sm">Managing Lamsal Kirana Stores Network</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block">
                    <p id="userName" class="font-bold text-sm">Loading...</p>
                    <p id="userEmail" class="text-xs text-emerald-500">Connecting...</p>
                </div>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-6 py-3 rounded-2xl border border-red-500/20 transition-all font-bold">
                    <i class="fas fa-power-off mr-2"></i> Sign Out
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl group-hover:scale-110 transition-transform"><i class="fas fa-users"></i></div>
                <p class="text-emerald-400 text-xs font-black tracking-widest uppercase">Ecosystem Users</p>
                <h3 id="userCount" class="text-4xl font-black mt-2">...</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl group-hover:scale-110 transition-transform"><i class="fas fa-rocket"></i></div>
                <p class="text-blue-400 text-xs font-black tracking-widest uppercase">Live Endpoints</p>
                <h3 id="appCount" class="text-4xl font-black mt-2">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl group-hover:scale-110 transition-transform"><i class="fas fa-globe"></i></div>
                <p class="text-purple-400 text-xs font-black tracking-widest uppercase">Server Latency</p>
                <h3 class="text-4xl font-black mt-2">14<span class="text-lg">ms</span></h3>
            </div>
            <div class="glass-card p-6 rounded-3xl flex items-center justify-center border-emerald-500/30">
                <div class="text-center">
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-emerald-500 font-bold text-sm">SYSTEM ONLINE</span>
                    </div>
                    <p class="text-[10px] text-gray-500 uppercase font-black">Cluster: South-Asia-1</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-8 md:p-12 rounded-[3rem]">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-500">
                    <i class="fas fa-plus"></i>
                </div>
                <h4 class="text-2xl font-bold">Register Production App</h4>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase ml-2">App Display Name</label>
                    <input type="text" id="appName" class="input-field w-full p-5 rounded-2xl" placeholder="e.g. Lamsal Kirana Mobile">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase ml-2">Redirect Redirect URI</label>
                    <input type="text" id="redUrl" class="input-field w-full p-5 rounded-2xl" placeholder="https://app.lamsalkirana.com/auth">
                </div>
            </div>
            
            <button onclick="generateAPI()" class="btn-premium w-full py-5 rounded-2xl font-black text-lg tracking-wide uppercase">
                Deploy API Configuration
            </button>
            
            <div id="resultBox" class="hidden mt-10 p-8 bg-black/40 border border-emerald-500/30 rounded-[2rem] animate-fade">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-black text-emerald-400 tracking-[0.2em]">GENERATED PRODUCTION LINK</span>
                    <button onclick="copyLink()" class="text-emerald-500 text-xs font-bold hover:underline">COPY LINK</button>
                </div>
                <code id="apiUrlDisplay" class="text-sm break-all text-gray-400 font-mono"></code>
            </div>
        </div>
    </div>

    <script type="module">
        // [IMPORTANT: Update this with your actual Firebase config from console]
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "lamsalauth.firebaseapp.com",
            projectId: "lamsalauth",
            storageBucket: "lamsalauth.firebasestorage.app",
            messagingSenderId: "1087666109571",
            appId: "1:1087666109571:web:5ea70c7add916cb6e5afb6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let isRegisterMode = false;

        // Toggler
        const toggleBtn = document.getElementById('toggleAuth');
        toggleBtn.onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerHTML = isRegisterMode ? 'Create <span class="text-emerald-500">Account</span>' : 'Lamsal <span class="text-emerald-500">Auth</span>';
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('mainBtn').innerText = isRegisterMode ? "Create Admin ID" : "Continue Access";
            toggleBtn.innerText = isRegisterMode ? "Already have access? Login" : "New to Lamsal? Create an account";
        };

        // Email/Pass Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('regName').value;

            try {
                if (isRegisterMode) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { name, email, createdAt: new Date() });
                    Swal.fire('Success', 'Admin Account Created', 'success');
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                Swal.fire('Authentication Failed', err.message, 'error');
            }
        };

        // Google Login Logic
        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                await setDoc(doc(db, "users", result.user.uid), {
                    name: result.user.displayName,
                    email: result.user.email,
                    photo: result.user.photoURL,
                    lastLogin: new Date()
                }, { merge: true });
            } catch (error) {
                Swal.fire('Google Auth Error', error.message, 'error');
            }
        };

        // State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('adminConsole').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName || "Admin User";
                document.getElementById('userEmail').innerText = user.email;
                
                // Real-time Dashboard Data
                onSnapshot(collection(db, "users"), (snap) => {
                    document.getElementById('userCount').innerText = snap.size.toLocaleString();
                });

                onSnapshot(collection(db, "apps"), (snap) => {
                    document.getElementById('appCount').innerText = snap.size;
                });
            } else {
                document.getElementById('authBox').classList.remove('hidden');
                document.getElementById('adminConsole').classList.add('hidden');
            }
        });

        // Generate and Save App Endpoint
        window.generateAPI = async () => {
            const name = document.getElementById('appName').value;
            const url = document.getElementById('redUrl').value;
            
            if(!name || !url) return Swal.fire('Wait!', 'Please fill all production details', 'warning');

            Swal.fire({ title: 'Deploying...', didOpen: () => Swal.showLoading() });

            try {
                await addDoc(collection(db, "apps"), {
                    appName: name,
                    redirectUrl: url,
                    creator: auth.currentUser.email,
                    createdAt: new Date()
                });

                const customBase = "https://auth.lamsalkiranastores.com.np";
                const finalLink = `${customBase}?app_id=${btoa(name)}&redirect=${encodeURIComponent(url)}`;
                
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('apiUrlDisplay').innerText = finalLink;
                
                Swal.fire('Deployed!', 'Your endpoint is now live on the unified network.', 'success');
            } catch (e) {
                Swal.fire('Deployment Failed', e.message, 'error');
            }
        };

        window.copyLink = () => {
            const link = document.getElementById('apiUrlDisplay').innerText;
            navigator.clipboard.writeText(link);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Link copied to clipboard', showConfirmButton: false, timer: 2000 });
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
