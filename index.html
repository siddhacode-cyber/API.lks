<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamsal Auth | Enterprise Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #10b981; --bg-dark: #05070a; --glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: white; min-height: 100vh; margin: 0; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(16,185,129,0.1); }
        .btn-premium { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16,185,129,0.2); }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 15, 20, 0.95); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        @media (max-width: 768px) { .mobile-nav { display: flex; justify-content: space-around; padding: 15px; } .desktop-sidebar { display: none; } }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- AUTH SECTION (Login/Register/Google) -->
    <div id="authBox" class="w-full max-w-md p-4 page-transition">
        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/30">
                    <i class="fas fa-shield-halved text-emerald-400 text-2xl"></i>
                </div>
                <h1 id="authTitle" class="text-2xl font-black">Lamsal Cloud</h1>
                <p id="authSub" class="text-gray-400 text-sm">Enterprise API Ecosystem</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div id="regFields" class="hidden space-y-4">
                    <input type="text" id="regName" class="input-field w-full px-6 py-4 rounded-2xl" placeholder="Full Name">
                    <input type="text" id="regPhone" class="input-field w-full px-6 py-4 rounded-2xl" placeholder="Phone Number">
                </div>
                <input type="email" id="email" class="input-field w-full px-6 py-4 rounded-2xl" placeholder="Email Address" required>
                <input type="password" id="password" class="input-field w-full px-6 py-4 rounded-2xl" placeholder="Password" required>
                
                <button type="submit" id="mainBtn" class="btn-premium w-full py-4 rounded-2xl font-bold text-white flex items-center justify-center gap-2">
                    <span>Login Access</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#05070a] px-3 text-gray-500">OR</span></div>
            </div>

            <button id="googleBtn" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-100 transition-all">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
                Continue with Google
            </button>

            <button id="toggleAuth" class="w-full text-center mt-6 text-emerald-400 text-sm font-semibold hover:underline">
                Don't have an account? Register
            </button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminConsole" class="hidden fixed inset-0 bg-[#05070a] flex flex-col md:flex-row overflow-hidden">
        <!-- Desktop Sidebar -->
        <aside class="desktop-sidebar w-64 glass-card h-full p-6 border-r border-white/5">
            <h2 class="text-xl font-black text-emerald-500 mb-10">LAMSAL.</h2>
            <nav class="space-y-4">
                <button onclick="showTab('dashboard')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-emerald-500/10 text-emerald-400 font-bold"><i class="fas fa-home"></i> Dashboard</button>
                <button onclick="showTab('users')" class="w-full flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:text-white"><i class="fas fa-users"></i> Users</button>
                <button onclick="logout()" class="w-full flex items-center gap-3 p-3 rounded-xl text-red-500 mt-10"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-4 md:p-10 pb-24">
            <div id="tab-dashboard">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold">System Console</h2>
                    <span id="adminMail" class="text-xs text-gray-500 bg-white/5 px-4 py-2 rounded-full"></span>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="glass-card p-6 rounded-[2rem] border-b-2 border-emerald-500">
                        <p class="text-gray-500 text-[10px] uppercase font-black">Total Users</p>
                        <h3 id="statTotalUsers" class="text-3xl font-black mt-2">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] border-b-2 border-blue-500">
                        <p class="text-gray-500 text-[10px] uppercase font-black">Total Requests</p>
                        <h3 id="statRequests" class="text-3xl font-black mt-2">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] border-b-2 border-purple-500">
                        <p class="text-gray-500 text-[10px] uppercase font-black">Uptime</p>
                        <h3 class="text-3xl font-black mt-2 text-emerald-400">99.9%</h3>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] border-b-2 border-orange-500">
                        <p class="text-gray-500 text-[10px] uppercase font-black">Server Status</p>
                        <h3 class="text-xl font-black mt-2 uppercase">Live</h3>
                    </div>
                </div>

                <!-- API Manager (Redirect Logic) -->
                <div class="glass-card p-8 rounded-[2.5rem] border border-white/5">
                    <h4 class="text-lg font-bold mb-2">API Redirect Manager</h4>
                    <p class="text-gray-400 text-sm mb-6">Create a protected link. Users must login before they are redirected to your website.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input type="text" id="appName" class="input-field p-4 rounded-2xl" placeholder="App/Campaign Name">
                        <input type="url" id="targetUrl" class="input-field p-4 rounded-2xl" placeholder="Target Website (https://...)">
                    </div>
                    <button onclick="generateAPI()" class="btn-premium w-full py-4 rounded-2xl font-bold uppercase tracking-wider">Generate Secure URL</button>
                    
                    <div id="apiResult" class="hidden mt-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl flex items-center justify-between">
                        <code id="finalLink" class="text-emerald-400 text-xs break-all"></code>
                        <button onclick="copyLink()" class="ml-4 text-white hover:text-emerald-400"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            </div>

            <!-- User Management Tab -->
            <div id="tab-users" class="hidden">
                <h2 class="text-2xl font-bold mb-6">User Database</h2>
                <div class="glass-card rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white/5 text-[10px] uppercase text-gray-500 font-bold">
                            <tr>
                                <th class="p-5">User Info</th>
                                <th class="p-5">Status</th>
                                <th class="p-5">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="text-sm">
                            <!-- Live Users Data -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav">
            <button onclick="showTab('dashboard')" class="flex flex-col items-center text-emerald-500"><i class="fas fa-grid-2 text-xl"></i><span class="text-[10px] mt-1">Home</span></button>
            <button onclick="showTab('users')" class="flex flex-col items-center text-gray-500"><i class="fas fa-users text-xl"></i><span class="text-[10px] mt-1">Users</span></button>
            <button onclick="logout()" class="flex flex-col items-center text-red-500"><i class="fas fa-power-off text-xl"></i><span class="text-[10px] mt-1">Exit</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBGOtzwfGhDOIEpcUtc-m7TIU9KLP6L100",
            authDomain: "lamsalauth.firebaseapp.com",
            projectId: "lamsalauth",
            storageBucket: "lamsalauth.firebasestorage.app",
            messagingSenderId: "1087666109571",
            appId: "1:1087666109571:web:5ea70c7add916cb6e5afb6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_UID = "Y7UwOutkLEYGFirc7NQnKD5pUdQ2"; 
        let isRegisterMode = false;

        // Toggle Login/Register
        document.getElementById('toggleAuth').onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? "Create Account" : "Lamsal Cloud";
            document.getElementById('mainBtn').innerText = isRegisterMode ? "Register Now" : "Login Access";
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('toggleAuth').innerText = isRegisterMode ? "Already a user? Login" : "Don't have an account? Register";
        };

        // Real Auth Submit
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loginLoader');
            loader.style.display = "block";
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                if (isRegisterMode) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: document.getElementById('regName').value || 'Anonymous',
                        email: email,
                        phone: document.getElementById('regPhone').value || 'N/A',
                        status: "active",
                        role: "user",
                        joined: new Date().toLocaleDateString()
                    });
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    const userCheck = await getDoc(doc(db, "users", res.user.uid));
                    if (userCheck.exists() && userCheck.data().status === "blocked") {
                        await signOut(auth);
                        throw new Error("Your account is BLOCKED.");
                    }
                }
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
            finally { loader.style.display = "none"; }
        };

        // Google Auth
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                const userDoc = await getDoc(doc(db, "users", res.user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: res.user.displayName,
                        email: res.user.email,
                        status: "active",
                        role: "user",
                        joined: new Date().toLocaleDateString()
                    });
                } else if (userDoc.data().status === "blocked") {
                    await signOut(auth);
                    throw new Error("Your Google account is blocked.");
                }
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };

        // Session Observer
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');

                if (user.uid === ADMIN_UID) {
                    showDashboard(user);
                } else if (redirect) {
                    // Count Request & Redirect
                    await updateDoc(doc(db, "stats", "global"), { requests: increment(1) }).catch(async () => {
                        await setDoc(doc(db, "stats", "global"), { requests: 1 });
                    });
                    Swal.fire({ title: 'Authorized', text: 'Redirecting...', icon: 'success', timer: 1500, showConfirmButton: false });
                    setTimeout(() => window.location.href = redirect, 1600);
                } else {
                    document.body.innerHTML = `<div class="h-screen flex flex-col items-center justify-center gap-4">
                        <h1 class="text-xl">Authenticated as ${user.email}</h1>
                        <p class="text-gray-500">No redirect URL found.</p>
                        <button onclick="window.logOutNow()" class="bg-red-500 px-6 py-2 rounded-xl">Logout</button>
                    </div>`;
                    window.logOutNow = () => signOut(auth).then(() => location.href = window.location.pathname);
                }
            } else {
                document.getElementById('authBox').classList.remove('hidden');
                document.getElementById('adminConsole').classList.add('hidden');
            }
        });

        // Dashboard View
        async function showDashboard(user) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('adminConsole').classList.remove('hidden');
            document.getElementById('adminMail').innerText = user.email;
            
            // Load Real Stats
            const usersSnap = await getDocs(collection(db, "users"));
            document.getElementById('statTotalUsers').innerText = usersSnap.size;

            const statSnap = await getDoc(doc(db, "stats", "global"));
            document.getElementById('statRequests').innerText = statSnap.exists() ? statSnap.data().requests : 0;

            loadUserTable();
        }

        window.loadUserTable = async () => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            const snap = await getDocs(collection(db, "users"));
            snap.forEach(docSnap => {
                const u = docSnap.data();
                const isBlocked = u.status === "blocked";
                tbody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="p-5">
                            <div class="font-bold">${u.name}</div>
                            <div class="text-[10px] text-gray-500">${u.email}</div>
                        </td>
                        <td class="p-5">
                            <span class="px-2 py-1 rounded text-[10px] ${isBlocked ? 'bg-red-500/20 text-red-500' : 'bg-emerald-500/20 text-emerald-400'}">${u.status}</span>
                        </td>
                        <td class="p-5">
                            <button onclick="toggleUserStatus('${docSnap.id}', '${u.status}')" class="bg-white/10 px-3 py-1 rounded text-xs">
                                ${isBlocked ? 'Unblock' : 'Block'}
                            </button>
                        </td>
                    </tr>
                `;
            });
        };

        window.toggleUserStatus = async (uid, current) => {
            const newStatus = current === "active" ? "blocked" : "active";
            await updateDoc(doc(db, "users", uid), { status: newStatus });
            loadUserTable();
            Swal.fire('Success', 'User status updated', 'success');
        };

        window.generateAPI = () => {
            const url = document.getElementById('targetUrl').value;
            if(!url) return Swal.fire('Error', 'Enter a website URL', 'warning');
            const final = `${window.location.origin}${window.location.pathname}?redirect=${encodeURIComponent(url)}`;
            document.getElementById('apiResult').classList.remove('hidden');
            document.getElementById('finalLink').innerText = final;
        };

        window.copyLink = () => {
            navigator.clipboard.writeText(document.getElementById('finalLink').innerText);
            Swal.fire({ title: 'Copied!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
        };

        window.showTab = (tab) => {
            document.getElementById('tab-dashboard').classList.toggle('hidden', tab !== 'dashboard');
            document.getElementById('tab-users').classList.toggle('hidden', tab !== 'users');
        };

        window.logout = () => signOut(auth);

    </script>
</body>
</html>
