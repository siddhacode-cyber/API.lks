<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamsal Auth | Enterprise API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #10b981;
            --bg-dark: #05070a;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #05070a;
            background-image: radial-gradient(circle at 0% 0%, #0d2e26 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #05070a 0%, transparent 50%);
            color: white; 
            min-height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Mobile App Transitions */
        .page-transition {
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Input Styling */
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        /* Floating Bottom Nav for Mobile */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        @media (max-width: 768px) {
            .mobile-nav { display: flex; justify-content: space-around; padding: 12px; }
            .desktop-sidebar { display: none; }
            .auth-card { border-radius: 2rem 2rem 0 0; position: fixed; bottom: 0; width: 100%; }
        }

        .btn-premium {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Loader */
        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- LOGIN/AUTH SCREEN -->
    <div id="authBox" class="w-full max-w-md page-transition px-4 sm:px-0">
        <div class="glass-card rounded-[2.5rem] p-8 relative overflow-hidden shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/30">
                    <i class="fas fa-shield-halved text-emerald-400 text-3xl"></i>
                </div>
                <h1 id="authTitle" class="text-3xl font-extrabold tracking-tight">Lamsal Cloud</h1>
                <p id="authSub" class="text-gray-400 text-sm mt-2">Access the Unified API Ecosystem</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div id="regFields" class="hidden space-y-4 mb-4">
                    <input type="text" id="regName" class="input-field w-full px-6 py-4 rounded-2xl outline-none" placeholder="Full Name">
                    <input type="text" id="regPhone" class="input-field w-full px-6 py-4 rounded-2xl outline-none" placeholder="Mobile Number">
                </div>

                <input type="email" id="email" class="input-field w-full px-6 py-4 rounded-2xl outline-none" placeholder="Email Address" required>
                <input type="password" id="password" class="input-field w-full px-6 py-4 rounded-2xl outline-none" placeholder="Password" required>

                <button type="submit" id="mainBtn" class="btn-premium w-full py-4 rounded-2xl font-bold text-white text-lg flex items-center justify-center gap-2">
                    <span>Login Access</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0b121a] px-4 text-gray-500 font-bold">Secure Gateway</span></div>
            </div>

            <button id="googleBtn" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-100 transition-all">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
                Continue with Google
            </button>

            <div class="text-center mt-6">
                <button id="toggleAuth" class="text-emerald-400 text-sm font-semibold hover:underline">
                    Don't have an account? Register
                </button>
            </div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD (Mobile & Web Responsive) -->
    <div id="adminConsole" class="hidden w-full min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar for Desktop -->
        <aside class="desktop-sidebar w-64 glass-card h-screen p-6 sticky top-0">
            <h2 class="text-2xl font-black mb-10 text-emerald-500">LAMSAL.</h2>
            <nav class="space-y-6">
                <a href="#" class="flex items-center gap-3 text-emerald-400 font-bold"><i class="fas fa-home"></i> Dashboard</a>
                <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white"><i class="fas fa-users"></i> Users</a>
                <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white"><i class="fas fa-code"></i> API Keys</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-10 pb-24 md:pb-10">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold">Console Overview</h2>
                    <p id="adminMail" class="text-gray-500 text-sm"></p>
                </div>
                <button onclick="logout()" class="bg-red-500/20 text-red-500 p-3 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

            <!-- Real Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="glass-card p-6 rounded-3xl border-b-4 border-emerald-500">
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Total Users</p>
                    <h3 id="userCount" class="text-3xl font-black">--</h3>
                </div>
                <div class="glass-card p-6 rounded-3xl border-b-4 border-blue-500">
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Live Apps</p>
                    <h3 class="text-3xl font-black">12</h3>
                </div>
                <div class="glass-card p-6 rounded-3xl border-b-4 border-purple-500">
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Requests</p>
                    <h3 class="text-3xl font-black">1.2k</h3>
                </div>
                <div class="glass-card p-6 rounded-3xl border-b-4 border-orange-500">
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Uptime</p>
                    <h3 class="text-3xl font-black text-emerald-400">99%</h3>
                </div>
            </div>

            <!-- API Manager -->
            <div class="glass-card p-6 md:p-8 rounded-[2.5rem] mb-10">
                <h4 class="text-lg font-bold mb-6">Create Redirect API</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="appName" class="input-field p-4 rounded-2xl outline-none" placeholder="App Name (e.g. MyStore)">
                    <input type="url" id="redUrl" class="input-field p-4 rounded-2xl outline-none" placeholder="Redirect URL (https://...)">
                </div>
                <button onclick="generateAPI()" class="btn-premium w-full py-4 rounded-2xl font-bold uppercase">Generate Protected Link</button>
                
                <div id="resultBox" class="hidden mt-6 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl">
                    <p class="text-[10px] text-emerald-400 font-bold mb-2">PRODUCTION ENDPOINT:</p>
                    <div class="flex items-center gap-3">
                        <code id="apiUrlDisplay" class="text-xs break-all text-gray-300 flex-1"></code>
                        <i class="fas fa-copy cursor-pointer text-emerald-400" onclick="copyApi()"></i>
                    </div>
                </div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav">
            <div class="flex flex-col items-center text-emerald-500">
                <i class="fas fa-th-large text-xl"></i>
                <span class="text-[10px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-500">
                <i class="fas fa-users text-xl"></i>
                <span class="text-[10px] font-bold">Users</span>
            </div>
            <div class="flex flex-col items-center text-gray-500">
                <i class="fas fa-cog text-xl"></i>
                <span class="text-[10px] font-bold">Settings</span>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Keep your original)
        const firebaseConfig = {
            apiKey: "AIzaSyBGOtzwfGhDOIEpcUtc-m7TIU9KLP6L100",
            authDomain: "lamsalauth.firebaseapp.com",
            projectId: "lamsalauth",
            storageBucket: "lamsalauth.firebasestorage.app",
            messagingSenderId: "1087666109571",
            appId: "1:1087666109571:web:5ea70c7add916cb6e5afb6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_UID = "Y7UwOutkLEYGFirc7NQnKD5pUdQ2"; // Fixed Admin UID
        let isRegisterMode = false;

        // UI Toggle
        document.getElementById('toggleAuth').onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? "Join Cloud" : "Lamsal Cloud";
            document.getElementById('mainBtn').innerText = isRegisterMode ? "Register Now" : "Login Access";
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('toggleAuth').innerText = isRegisterMode ? "Already a user? Login" : "Don't have an account? Register";
        };

        // Real Auth Submit
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loginLoader');
            loader.style.display = "block";

            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                if (isRegisterMode) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: document.getElementById('regName').value,
                        phone: document.getElementById('regPhone').value,
                        email: email,
                        role: "user",
                        joined: new Date().toISOString()
                    });
                    Swal.fire('Welcome!', 'Registration Successful', 'success');
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                Swal.fire('Error', err.message, 'error');
            } finally {
                loader.style.display = "none";
            }
        };

        // Google Auth
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                await setDoc(doc(db, "users", res.user.uid), {
                    name: res.user.displayName,
                    email: res.user.email,
                    role: "user"
                }, { merge: true });
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };

        // Session Observer (The Core Logic)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.uid === ADMIN_UID) {
                    showDashboard(user);
                } else {
                    processRedirect(user);
                }
            } else {
                document.getElementById('authBox').classList.remove('hidden');
                document.getElementById('adminConsole').classList.add('hidden');
            }
        });

        async function showDashboard(user) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('adminConsole').classList.remove('hidden');
            document.getElementById('adminMail').innerText = user.email;
            
            // Get Real Live User Count
            const snapshot = await getDocs(collection(db, "users"));
            document.getElementById('userCount').innerText = snapshot.size;
        }

        function processRedirect(user) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) {
                Swal.fire({ title: 'Authorized', text: 'Connecting you...', icon: 'success', timer: 1500, showConfirmButton: false });
                setTimeout(() => window.location.href = `${redirect}?status=success&uid=${user.uid}`, 1600);
            } else {
                Swal.fire('Identity Verified', 'No target redirect found. You are now logged in.', 'info');
            }
        }

        window.logout = () => signOut(auth);

        window.generateAPI = () => {
            const name = document.getElementById('appName').value;
            const url = document.getElementById('redUrl').value;
            if(!url) return Swal.fire('Missing URL', '', 'warning');

            const final = `${window.location.origin}${window.location.pathname}?app=${encodeURIComponent(name)}&redirect=${encodeURIComponent(url)}`;
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('apiUrlDisplay').innerText = final;
        };

        window.copyApi = () => {
            navigator.clipboard.writeText(document.getElementById('apiUrlDisplay').innerText);
            Swal.fire({ title: 'Copied!', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, icon: 'success' });
        };
    </script>
</body>
</html>
